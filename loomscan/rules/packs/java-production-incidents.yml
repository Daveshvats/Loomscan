      cwe: CWE-476
  - id: kotlin-lateinit-no-check
    pattern: 'lateinit\s+var'
    severity: low
    message: "lateinit var тАФ accessing before initialization throws UninitializedPropertyAccessException. Use ::property.isInitialized check."
    metadata:
      cwe: CWE-476

  # =========================================================================
  # 28. SPRING ACTUATOR EXPOSURE
  # =========================================================================
  - id: actuator-all-endpoints-exposed
    pattern: 'management\.endpoints\.web\.exposure\.include\s*=\s*\*'
    severity: critical
