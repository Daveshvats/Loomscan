# =============================================================================
# LoomScan Java rule pack тАФ Production-Incident Prevention
# =============================================================================
# Scope: NEW rules that catch Java/Spring errors which cause PRODUCTION
# INCIDENTS (500 errors, OOM, data leaks, RCE, crashes) BEFORE they ship.
#
# Design notes (read before editing):
#   * The YAML regex engine (loomscan/yaml_engine.py + rule_dsl.py) matches
#     PER-LINE with Python's `re` module. Patterns MUST match a single line
#     of Java source тАФ do NOT use `\n` or DOTALL constructs.
#   * Patterns use Python regex syntax. Inline flags via /pattern/i are also
#     supported by the engine.
#   * Single-quoted YAML strings are used: backslashes are literal, and a
#     literal single quote is written as '' (so a char-class ['"] becomes
#     [''"]).
#   * Negative lookaheads like ^(?!.*try\s*\() are used as line-anchored
#     "absence" checks (e.g. "variable assigned OUTSIDE try-with-resources").
#   * Taint cannot be tracked with regex, so SSRF/path-traversal rules use the
#     same user-input variable-name heuristic already used by java-deep.yml
#     (request|req|input|user|req.getParameter|args|...).
#   * These rules are INTENTIONALLY non-overlapping with java-security.yml,
#     java-deep.yml and java-frameworks.yml. Deduplicate against those packs
#     if you merge.
# =============================================================================

rules:

  # =========================================================================
  # 1. SQL INJECTION (gaps not covered by existing @Query/JdbcTemplate rules)
  # =========================================================================
  - id: sql-stringbuilder-query
    pattern: '\bStringBuilder\b.{0,200}?\b(?:SELECT|INSERT\s+INTO|UPDATE|DELETE\s+FROM|FROM|WHERE)\b'
    severity: high
    message: "SQL built with StringBuilder тАФ likely SQL injection. Use parameterized queries / JdbcTemplate bind args."
    metadata:
      cwe: CWE-89
      owasp: A03

  - id: sql-entitymanager-createquery-concat
    pattern: '\.create(?:Native)?Query\s*\(\s*"[^"]*"\s*\+'
    severity: critical
    message: "EntityManager.create(Native)Query with string concatenation тАФ SQL injection. Bind parameters with setParameter."
    metadata:
      cwe: CWE-89
      owasp: A03

  - id: sql-query-spel-tclass-injection
    pattern: '@Query\s*\([^)]*#\{[^}]*\bT\s*\('
    severity: high
    message: "@Query SpEL uses T(...) type reference тАФ SpEL injection / RCE risk if any input reaches the expression. Avoid T() in @Query SpEL."
    metadata:
      cwe: CWE-94
      owasp: A03

  - id: sql-mybatis-dollar-brace-substitution
    pattern: '@(?:Select|Insert|Update|Delete)\s*\(\s*"[^"]*\$\{'
    severity: critical
    message: "MyBatis ${...} substitution concatenates raw SQL тАФ SQL injection. Use #{...} parameter binding instead."
    metadata:
      cwe: CWE-89
      owasp: A03

  # =========================================================================
  # 2. SSRF (existing rules flag any HTTP call; these target user-controlled URLs)
  # =========================================================================
  - id: ssrf-url-openconnection-variable
    pattern: 'new\s+URL\s*\(\s*(?!["''])\w+\s*\)\s*\.(?:openConnection|openStream)'
    severity: high
    message: "URL.openConnection with a variable URL тАФ SSRF risk if URL is user-controlled. Validate/scheme-allowlist the URL."
    metadata:
      cwe: CWE-918
      owasp: A10

  - id: ssrf-resttemplate-user-controlled-url
    pattern: '(?:restTemplate|RestTemplate)\.(?:exchange|getForObject|getForEntity|postForObject|postForEntity|put|delete|patchForObject)\s*\(\s*(?:request|req|input|user|url|host|target|endpoint|uri|callback|redirect|fwd)\w*|(?:webClient|WebClient)\b.{0,40}?\.uri\s*\(\s*(?:request|req|input|user|url|host|target|endpoint|uri|callback|redirect|fwd)\w*'
    severity: high
    message: "RestTemplate/WebClient called with a user-named URL variable тАФ SSRF risk. Allowlist destinations and block private ranges."
    metadata:
      cwe: CWE-918
      owasp: A10

  - id: ssrf-httpclient-requestbuilder-variable
    pattern: 'HttpRequest\.newBuilder\s*\(\s*(?:URI\.create\s*\()?\s*(?:uri|url|host|endpoint|target|callback|request|input|user|redirect)\w*'
    severity: high
    message: "HttpClient request built from a user-named URI variable тАФ SSRF risk. Validate scheme/host and block internal addresses."
    metadata:
      cwe: CWE-918
      owasp: A10

  # =========================================================================
  # 3. PATH TRAVERSAL (existing covers new File(userInput); these add Paths.get/resolve/concat)
  # =========================================================================
  - id: pathtrav-paths-get-variable
    pattern: 'Paths\.get\s*\(\s*(?:request|req|input|user|req\.getParameter|args|fileName|filename|path|userPath|filePath|name)\w*'
    severity: high
    message: "Paths.get with user-controlled path тАФ path traversal. Canonicalize and confine to a base directory."
    metadata:
      cwe: CWE-22
      owasp: A01

  - id: pathtrav-path-resolve-variable
    pattern: '\.resolve\s*\(\s*(?:request|req\.getParameter|input|user|args|fileName|filename|path|name|userPath)\w*\s*\)'
    severity: medium
    message: "Path.resolve with user input тАФ verify the base path confines the result; otherwise path traversal."
    metadata:
      cwe: CWE-22
      owasp: A01

  - id: pathtrav-file-concat-variable
    pattern: 'new\s+File\s*\([^)]*\+\s*(?:request|req\.getParameter|input|user|args|fileName|filename|path|name|userPath)\w*'
    severity: high
    message: "new File(base + userInput) тАФ path traversal. Canonicalize and reject '..' / absolute paths."
    metadata:
      cwe: CWE-22
      owasp: A01

  # =========================================================================
  # 4. DESERIALIZATION (existing covers ObjectInputStream/readObject/Jackson/XStream)
  # =========================================================================
  - id: deser-xmldecoder
    pattern: 'new\s+XMLDecoder\s*\('
    severity: critical
    message: "java.beans.XMLDecoder deserializes arbitrary objects тАФ RCE on untrusted input. Avoid; use a schema-validated parser."
    metadata:
      cwe: CWE-502
      owasp: A08

  - id: deser-snakeyaml-load
    pattern: 'new\s+Yaml\s*\([^)]*\)\s*\.\s*(?:load|loadAs|loadAll)\s*\('
    severity: critical
    message: "SnakeYAML Yaml.load is unsafe (arbitrary object construction) тАФ RCE. Use new Yaml(new SafeConstructor())."
    metadata:
      cwe: CWE-502
      owasp: A08

  - id: deser-spring-serialization-utils
    pattern: 'SerializationUtils\.deserialize\s*\('
    severity: critical
    message: "Spring SerializationUtils.deserialize uses Java serialization тАФ RCE on untrusted bytes. Use JSON with type constraints."
    metadata:
      cwe: CWE-502
      owasp: A08

  - id: deser-kryo-readclassandobject
    pattern: '\bkryo\s*\.\s*(?:readClassAndObject|readObject)\s*\('
    severity: critical
    message: "Kryo readClassAndObject/readObject on untrusted input тАФ deserialization RCE. Register an allowlist of classes."
    metadata:
      cwe: CWE-502
      owasp: A08

  # =========================================================================
  # 5. XXE (existing covers DocumentBuilderFactory/SAXParser/StAX/JAXB; these add dom4j/TransformerFactory/XMLReaderFactory)
  # =========================================================================
  - id: xxe-dom4j-saxreader
    pattern: 'new\s+SAXReader\s*\('
    severity: high
    message: "dom4j SAXReader is XXE-vulnerable by default. Call setFeature(\"http://apache.org/xml/features/disallow-doctype-decl\", true)."
    metadata:
      cwe: CWE-611
      owasp: A05

  - id: xxe-transformerfactory-unconfigured
    pattern: 'TransformerFactory\.newInstance\s*\(\s*\)'
    severity: medium
    message: "TransformerFactory without FEATURE_SECURE_PROCESSING тАФ XSLT/XXE risk on untrusted input. Set secure processing."
    metadata:
      cwe: CWE-611
      owasp: A05

  - id: xxe-xmlreaderfactory-create
    pattern: 'XMLReaderFactory\.createXMLReader\s*\('
    severity: high
    message: "XMLReaderFactory.createXMLReader тАФ XXE risk. Set disallow-doctype-decl / external-general-entities to false."
    metadata:
      cwe: CWE-611
      owasp: A05

  # =========================================================================
  # 6. COMMAND INJECTION (existing covers generic Runtime.exec/ProcessBuilder;
  #    this catches the sh -c / bash -c shell form with concat = guaranteed injection)
  # =========================================================================
  - id: cmdinj-runtime-exec-shell-concat
    pattern: 'Runtime\.getRuntime\s*\(\s*\)\s*\.\s*exec\s*\(\s*"(?:sh|bash|cmd|/bin/sh|/bin/bash)[^"]*"\s*\+'
    severity: critical
    message: "Runtime.exec(\"sh\" + userInput) тАФ command injection via shell. Use ProcessBuilder with an argument list, never a shell string."
    metadata:
      cwe: CWE-78
      owasp: A03

  # =========================================================================
  # 7. CRYPTOGRAPHY (existing covers MD5/SHA1/DES/ECB/RSA-NoPadding/Blowfish/RC4;
  #    these add hardcoded keys/IV, bare AES, base64 keys)
  # =========================================================================
  - id: crypto-hardcoded-secretkeyspec
    pattern: 'new\s+SecretKeySpec\s*\(\s*(?:"[^"]+"|''[^'']+'')\s*\.getBytes'
    severity: high
    message: "SecretKeySpec built from a hardcoded string тАФ key disclosure. Load keys from a secrets manager / KMS."
    metadata:
      cwe: CWE-321
      owasp: A02

  - id: crypto-hardcoded-ivparameterspec
    pattern: 'new\s+IvParameterSpec\s*\(\s*(?:"[^"]+"\s*\.getBytes|new\s+byte\s*\[\s*\]\s*\{)'
    severity: medium
    message: "Hardcoded IV тАФ reusing an IV with the same key breaks CBC/GCM security. Generate a random IV per message."
    metadata:
      cwe: CWE-329
      owasp: A02

  - id: crypto-aes-bare-no-mode
    pattern: 'Cipher\.getInstance\s*\(\s*"AES"\s*\)'
    severity: high
    message: "Cipher.getInstance(\"AES\") defaults to AES/ECB тАФ ECB leaks patterns. Use AES/GCM/NoPadding with a random IV."
    metadata:
      cwe: CWE-327
      owasp: A02

  - id: crypto-base64-hardcoded-key
    pattern: '(?:Base64\.getDecoder\s*\(\s*\)\.decode|DatatypeConverter\.parseBase64Binary)\s*\(\s*"[A-Za-z0-9+/]{16,}={0,2}"\s*\)'
    severity: high
    message: "Decoding a hardcoded Base64 key string тАФ key disclosure. Store keys in a secrets manager, not source."
    metadata:
      cwe: CWE-321
      owasp: A02

  # =========================================================================
  # 8. CONCURRENCY (existing covers synchronized(this)/String, volatile array,
  #    double-checked locking; these add shared SimpleDateFormat, boxed-primitive
  #    lock, deprecated Thread.stop)
  # =========================================================================
  - id: conc-static-simpledateformat
    pattern: 'static\s+(?:final\s+)?(?:SimpleDateFormat|DateFormat)\s+'
    severity: high
    message: "Static SimpleDateFormat is shared across threads and is NOT thread-safe тАФ data corruption/crashes. Use DateTimeFormatter or ThreadLocal."
    metadata:
      cwe: CWE-362

  - id: conc-synchronized-boxed-primitive
    pattern: 'synchronized\s*\(\s*(?:Integer|Long|Short|Byte|Double|Float|Boolean|Character)\.valueOf\s*\('
    severity: medium
    message: "synchronized on a boxed primitive uses the JVM cache тАФ unrelated code can lock the same monitor, causing deadlock/starvation. Lock a dedicated final Object."
    metadata:
      cwe: CWE-362

  - id: conc-thread-stop-destroy
    pattern: 'Thread\.currentThread\s*\(\s*\)\s*\.\s*(?:stop|suspend|resume|destroy)\s*\(\s*\)|\bThread\.(?:stop|destroy)\s*\(\s*\)|\b\w*(?:[Tt]hread|[Ww]orker)\w*\s*\.\s*(?:stop|suspend|resume)\s*\(\s*\)'
    severity: high
    message: "Thread.stop/destroy/suspend/resume are deprecated and unsafe (corrupted state, deadlock). Use interrupts / cooperative cancellation."
    metadata:
      cwe: CWE-362

  # =========================================================================
  # 9. RESOURCE LEAKS (existing flags try-finally-close Semgrep-style;
  #    these catch the classic "Type var = new Closeable(...)" assignment
  #    OUTSIDE try-with-resources, the #1 cause of connection-pool exhaustion)
  # =========================================================================
  - id: leak-connection-not-try-with-resources
    pattern: '^(?!.*\btry\s*\().*\bConnection\s+\w+\s*=\s*\w*\.?getConnection[^;]*;'
    severity: high
    message: "Connection assigned outside try-with-resources тАФ connection leak / pool exhaustion. Use try (Connection c = ds.getConnection()) { ... }."
    metadata:
      cwe: CWE-404
      owasp: A09

  - id: leak-statement-not-try-with-resources
    pattern: '^(?!.*\btry\s*\().*\bStatement\s+\w+\s*=\s*\w+\.createStatement[^;]*;'
    severity: high
    message: "Statement assigned outside try-with-resources тАФ cursor/statement leak. Use try-with-resources."
    metadata:
      cwe: CWE-404

  - id: leak-preparedstatement-not-try-with-resources
    pattern: '^(?!.*\btry\s*\().*\bPreparedStatement\s+\w+\s*=\s*\w+\.prepareStatement[^;]*;'
    severity: high
    message: "PreparedStatement assigned outside try-with-resources тАФ leak. Use try-with-resources."
    metadata:
      cwe: CWE-404

  - id: leak-bufferedreader-not-try-with-resources
    pattern: '^(?!.*\btry\s*\().*\bBufferedReader\s+\w+\s*=\s*new\s+BufferedReader[^;]*;'
    severity: medium
    message: "BufferedReader assigned outside try-with-resources тАФ file-handle leak. Use try-with-resources."
    metadata:
      cwe: CWE-775

  - id: leak-inputstream-not-try-with-resources
    pattern: '^(?!.*\btry\s*\().*\b(?:FileInputStream|BufferedInputStream|InputStream)\s+\w+\s*=\s*new\s+(?:FileInputStream|BufferedInputStream)[^;]*;'
    severity: medium
    message: "InputStream assigned outside try-with-resources тАФ file-handle leak. Use try-with-resources."
    metadata:
      cwe: CWE-775

  - id: leak-filewriter-not-try-with-resources
    pattern: '^(?!.*\btry\s*\().*\bFileWriter\s+\w+\s*=\s*new\s+FileWriter[^;]*;'
    severity: medium
    message: "FileWriter assigned outside try-with-resources тАФ file-handle leak and un-flushed data loss. Use try-with-resources."
    metadata:
      cwe: CWE-775

  # =========================================================================
  # 10. NULL SAFETY (existing covers Optional.get / Optional.orElse(null);
  #     these add findFirst().get(), autoboxing unbox, and .get().chained())
  # =========================================================================
  - id: npe-findfirst-findany-get
    pattern: '\.find(?:First|Any)\s*\(\s*\)\s*\.\s*get\s*\(\s*\)'
    severity: high
    message: "findFirst()/findAny().get() throws NoSuchElementException on empty stream. Use isPresent()/ifPresent()/orElseThrow() with a message."
    metadata:
      cwe: CWE-754

  - id: npe-unbox-map-get-to-primitive
    pattern: '\b(?:int|long|double|float|boolean|short|byte|char)\s+\w+\s*=\s*(?!\w*[Aa]tomic)\w+\.get\s*\('
    severity: medium
    message: "Assigning Map.get(...) to a primitive autoboxes тАФ NPE if the key is absent. Use getOrDefault or check for null first."
    metadata:
      cwe: CWE-476

  - id: npe-get-then-deref
    pattern: '\.get\s*\(\s*\)\s*\.\s*\w+\s*\('
    severity: high
    message: ".get().method() dereferences the result without a null/isPresent check тАФ NPE risk (Optional/Map). Use orElse*/ifPresent."
    metadata:
      cwe: CWE-476

  # =========================================================================
  # 11. SPRING SECURITY MISCONFIGURATION (existing covers csrf().disable,
  #     antMatchers(\"/**\").permitAll, noop/md5/sha1 encoders, https-cookie-secure-false,
  #     method-security-disabled; these add anyRequest().permitAll, web.ignoring,
  #     headers().disable, requiresInsecure, @PreAuthorize SpEL injection)
  # =========================================================================
  - id: springsec-any-request-permit-all
    pattern: 'anyRequest\s*\(\s*\)\s*\.\s*permitAll\s*\(\s*\)'
    severity: high
    message: "anyRequest().permitAll() disables authorization for all unmatched requests тАФ auth bypass. Use authenticated() and allowlist specific paths."
    metadata:
      cwe: CWE-862
      owasp: A01

  - id: springsec-web-ignoring-antmatchers-all
    pattern: 'web\s*\.\s*ignoring\s*\(\s*\)\s*\.\s*(?:antMatchers|requestMatchers)\s*\(\s*"/\*\*"'
    severity: high
    message: "web.ignoring().antMatchers(\"/**\") skips the ENTIRE security filter chain (incl. CSRF, security headers) for all paths тАФ broad bypass."
    metadata:
      cwe: CWE-693
      owasp: A05

  - id: springsec-headers-disabled
    pattern: 'headers\s*\(\s*\)\s*\.\s*disable\s*\(\s*\)'
    severity: medium
    message: "headers().disable() turns off X-Frame-Options, X-XSS-Protection, HSTS тАФ clickjacking/XSS exposure. Remove unless explicitly justified."
    metadata:
      cwe: CWE-693
      owasp: A05

  - id: springsec-requires-insecure
    pattern: 'requiresInsecure\s*\('
    severity: high
    message: "requiresInsecure() forces HTTP тАФ plaintext transport / credential leak. Use requiresSecure() and redirect HTTP->HTTPS."
    metadata:
      cwe: CWE-319
      owasp: A02

  - id: springsec-preauthorize-spel-concat
    pattern: '@PreAuthorize\s*\([^)]*"\s*\+'
    severity: high
    message: "@PreAuthorize built with string concatenation тАФ SpEL injection / authz bypass. Use SpEL variables (#param), never concat."
    metadata:
      cwe: CWE-94
      owasp: A01

  - id: springsec-preauthorize-spel-tclass
    pattern: '@PreAuthorize\s*\([^)]*\bT\s*\(\s*java\.'
    severity: high
    message: "@PreAuthorize SpEL references T(java...) тАФ type reflection enables arbitrary code execution if input reaches the expression. Remove T()."
    metadata:
      cwe: CWE-94
      owasp: A01

  # =========================================================================
  # 12. ERROR-HANDLING ANTI-PATTERNS (existing covers catch Exception/Throwable,
  #     throw new Exception, empty catch; these add swallow-and-return,
  #     throw-in-finally, raw `throws Exception`)
  # =========================================================================
  - id: err-catch-return-swallow
    # v7.3.2: Rewritten as single-line pattern. The YAML engine scans line-by-line,
    # so this only fires when `catch (...) { return ...` is on the same line.
    # The multi-line form `catch (E e) {\n return null;}` is caught by the BL-miner
    # rule `bl.java.swallow_exception_return_null` (function-scoped, cross-line).
    pattern: 'catch\s*\([^)]*\)\s*\{\s*return\s+(?:null|0|false|true|new\s|Collections\.emptyList|"")'
    severity: medium
    message: "catch { return null/0/false } swallows the exception and silently returns тАФ masks failures (often returns null causing downstream NPE). Log and rethrow or return a typed error."
    metadata:
      cwe: CWE-390

  - id: err-throw-in-finally
    # v7.3.2: rewritten as single-line pattern. The v7.3.1 rule `exc-finally-throws`
    # covers the multi-line case via the BL-miner; this single-line rule catches
    # the common form `finally { throw new ...(); }` on one line.
    pattern: 'finally\s*\{[^}]*\bthrow\s+new\b'
    severity: medium
    message: "throw inside finally тАФ suppresses the original exception from the try block, hiding the real cause. Never throw in finally."
    metadata:
      cwe: CWE-396

  - id: err-method-throws-raw-exception
    pattern: '\bthrows\b[^{;]*\bException\b'
    severity: low
    message: "Method declares `throws Exception` тАФ forces callers into broad catch blocks that mask real errors and produce generic 500s. Declare specific exceptions."
    metadata:
      cwe: CWE-396

  # =========================================================================
  # 13. PERFORMANCE ANTI-PATTERNS (existing covers stream().collect(toList) OOM;
  #     user has @OneToMany N+1; these add findAll() unpaginated, EAGER fetch,
  #     default-EAGER @ManyToOne, save-in-forEach)
  # =========================================================================
  - id: perf-findall-unpaginated
    pattern: '\.\s*findAll\s*\(\s*\)'
    severity: medium
    message: "findAll() with no Pageable loads the entire table into memory тАФ OOM / DB pressure as data grows. Use findAll(Pageable) or a stream with limits."
    metadata:
      cwe: CWE-400
      owasp: A09

  - id: perf-onetomany-eager-fetch
    pattern: '@OneToMany\s*\([^)]*fetch\s*=\s*FetchType\.EAGER'
    severity: high
    message: "@OneToMany(fetch=EAGER) loads the whole collection per parent тАФ N+1 / OOM on large graphs. Use LAZY + explicit fetching/join."
    metadata:
      cwe: CWE-400

  - id: perf-manytoone-default-eager
    pattern: '@ManyToOne\b(?!.*fetch\s*=\s*FetchType\.LAZY)'
    severity: medium
    message: "@ManyToOne defaults to EAGER тАФ N+1 queries when iterating collections. Set fetch=FetchType.LAZY and join-fetch where needed."
    metadata:
      cwe: CWE-400

  - id: perf-save-in-foreach-stream
    pattern: '\.stream\s*\(\s*\)\s*\.\s*forEach\s*\([^)]*(?:::|\.)(?:save|insert|update|delete)\w*'
    severity: medium
    message: "save/insert inside stream().forEach() issues N separate statements тАФ use saveAll/ batch inserts. Major prod slowdown on large inputs."
    metadata:
      cwe: CWE-400

  # =========================================================================
  # 14. LOGGING ISSUES (existing covers spring-logging-secret; these add
  #     log injection via raw user input and logging of sensitive fields)
  # =========================================================================
  - id: log-user-input-unsanitized
    pattern: 'log(?:ger)?\.(?:info|debug|warn|error|trace|fatal)\s*\(\s*(?:request|req|input|user|httpRequest|servletRequest|exchange)\.(?:getParameter|getHeader|getReader|getBody|getQueryParams|getURI|getPath|getInputStream)'
    severity: medium
    message: "Logging raw user input тАФ log injection (CRLF forgery) and log parsing corruption. Sanitize/encode newlines before logging."
    metadata:
      cwe: CWE-117
      owasp: A09

  - id: log-sensitive-field
    pattern: 'log(?:ger)?\.(?:info|debug|warn|error|trace)\s*\([^)]*[\+"'' ,=]\s*\w*(?i:password|passwd|secret|api[_-]?key|secret[_-]?key|access[_-]?key|private[_-]?key|token|creditcard|card[_-]?number|cvv|ssn|pan)\w*\s*[,)]'
    severity: high
    message: "Logging a sensitive field (password/token/key/card) тАФ information disclosure to log aggregators. Mask or omit secrets in logs."
    metadata:
      cwe: CWE-532
      owasp: A09

  # =========================================================================
  # 15. INPUT VALIDATION (existing covers model-attribute binding / multipart;
  #     these add missing @Valid on @RequestBody, @PathVariable String for IDs,
  #     raw Map body)
  # =========================================================================
  - id: valid-requestbody-missing-valid
    pattern: '^(?!.*@(?:Valid|Validated)\b).*@RequestBody\s+(?!String\b|Map\b|List\b|Object\b)\w+'
    severity: medium
    message: "@RequestBody DTO without @Valid/@Validated тАФ bean-validation constraints on the DTO are skipped. Add @Valid."
    metadata:
      cwe: CWE-20
      owasp: A03

  - id: valid-pathvariable-string-for-id
    pattern: '@PathVariable\s+String\s+\w*(?:[Ii]d|uuid|UUID|key|code|slug|token)\w*\s*[),]'
    severity: medium
    message: "@PathVariable String for an id/uuid/key тАФ accepts any input (path traversal / injection). Use a typed UUID/Long or validate format."
    metadata:
      cwe: CWE-20
      owasp: A03

  - id: valid-requestbody-raw-map
    pattern: '@RequestBody\s+Map\s*<'
    severity: medium
    message: "@RequestBody Map<...> accepts arbitrary JSON тАФ no schema/size/shape validation. Bind a typed DTO with constraints instead."
    metadata:
      cwe: CWE-20
      owasp: A03

  # =========================================================================
  # 16. JPA / HIBERNATE BATCH ISSUES (production OOM + slow queries)
  # =========================================================================
  - id: jpa-flush-in-loop
    pattern: 'for\s*\(.*\)\s*\{[^}]*\.flush\(\)'
    severity: high
    message: "EntityManager.flush() inside a loop тАФ causes N database round-trips. Batch flush outside the loop or use @BatchSize."
    metadata:
      cwe: CWE-400
  - id: jpa-saveall-in-loop
    # v7.3.2: Rewritten as single-line pattern. The v7.3.1 rule `perf-save-in-loop-regex`
    # covers the multi-line `for (...) { ... .save(x); }` case via BL-miner.
    # This single-line rule catches the compact form: `for (X x : list) repo.save(x);`
    pattern: 'for\s*\([^)]*\)\s*[^{;]*\.save\s*\('
    severity: medium
    message: "repository.save() inside a loop тАФ N individual INSERTs. Use saveAll() for batch insert."
    metadata:
      cwe: CWE-400
  - id: jpa-no-batch-size
    pattern: '@OneToMany\s*\([^)]*fetch\s*=\s*FetchType\.EAGER'
    severity: high
    message: "EAGER @OneToMany тАФ loads ALL child entities. Use LAZY fetch + @BatchSize to prevent OOM and N+1."
    metadata:
      cwe: CWE-400
  - id: jpa-nativesql-select-star
    pattern: 'createNativeQuery\s*\(\s*[''"]SELECT\s+\*'
    severity: medium
    message: "Native query with SELECT * тАФ pulls all columns including large ones. Select only needed columns."
    metadata:
      cwe: CWE-400
  - id: jpa-criteria-builder-no-distinct
    pattern: 'CriteriaBuilder.*\.createQuery.*multiselect.*\)\s*\)\s*;\s*$'
    severity: low
    message: "Criteria query without DISTINCT on joins тАФ may return duplicate rows. Add .distinct(true)."
    metadata:
      cwe: CWE-400

  # =========================================================================
  # 17. REACTIVE PROGRAMMING (Project Reactor / WebFlux)
  # =========================================================================
  - id: reactive-mono-block
    pattern: '\.block\s*\(\s*\)'
    severity: high
    message: "Mono.block() in reactive code тАФ blocks the event loop thread. Use subscribe() or return the Mono."
    metadata:
      cwe: CWE-754
  - id: reactive-flux-collectlist-oom
    pattern: 'Flux.*\.collectList\s*\(\)'
    severity: medium
    message: "Flux.collectList() тАФ buffers entire stream in memory. For large streams, process elements individually."
    metadata:
      cwe: CWE-400
  - id: reactive-flux-to-iterable
    pattern: 'Flux.*\.toIterable\s*\(\)'
    severity: high
    message: "Flux.toIterable() тАФ blocks and buffers entire stream. Use reactive operators instead."
    metadata:
      cwe: CWE-754
  - id: reactive-no-onerrormap
    pattern: '\.flatMap\s*\([^)]*\)\s*(?!.*\.onErrorReturn|.*\.onErrorResume|.*\.onErrorMap)'
    severity: medium
    message: "Reactive chain without error handling тАФ unhandled errors propagate and cause 500s. Add onErrorResume/onErrorReturn."
    metadata:
      cwe: CWE-755
  - id: reactive-subscribe-no-error-handler
    pattern: '\.subscribe\s*\(\s*\)'
    severity: medium
    message: "subscribe() without error handler тАФ exceptions are swallowed silently. Pass an error Consumer: subscribe(next, error)."
    metadata:
      cwe: CWE-390

  # =========================================================================
  # 18. MEMORY LEAK PATTERNS (production OOM over time)
  # =========================================================================
  - id: leak-static-collection
    pattern: 'static\s+(?:final\s+)?(?:List|Map|Set|HashMap|ArrayList|HashSet|ConcurrentHashMap)\s*<'
    severity: high
    message: "Static collection тАФ entries never garbage collected. Ensure bounded size or use WeakHashMap/Cache with TTL."
    metadata:
      cwe: CWE-401
  - id: leak-threadlocal-static-field
    # v7.5.3: Renamed from leak-threadlocal-no-remove to avoid duplicate rule ID
    # (the v7.3.1 version at line 1422 has a better pattern + message).
    # This rule catches static ThreadLocal fields; the other catches ThreadLocal
    # instantiation. Both are valid but distinct patterns.
    pattern: 'ThreadLocal\s*<[^>]+>\s+\w+\s*=\s*new\s+ThreadLocal'
    severity: high
    message: "Static ThreadLocal field тАФ memory leak in thread pools. Always call remove() in finally block."
    metadata:
      cwe: CWE-401
  - id: leak-static-spring-bean
    pattern: 'static\s+(?:@Autowired|@Resource|@Inject)'
    severity: high
    message: "Static @Autowired field тАФ Spring bean held in static reference prevents GC. Use instance field or @PostConstruct."
    metadata:
      cwe: CWE-401
  - id: leak-scheduled-fixed-rate
    pattern: 'scheduleAtFixedRate|scheduleWithFixedDelay'
    severity: low
    message: "Scheduled task тАФ verify it doesn't accumulate state. Long-running tasks can cause thread pool exhaustion."
    metadata:
      cwe: CWE-754

  # =========================================================================
  # 19. TIME / DATE BUGS (production timezone + formatting issues)
  # =========================================================================
  - id: date-simpledateformat-shared
    pattern: 'static\s+(?:final\s+)?SimpleDateFormat'
    severity: high
    message: "Static SimpleDateFormat тАФ NOT thread-safe. Use DateTimeFormatter (thread-safe) or ThreadLocal<SimpleDateFormat>."
    metadata:
      cwe: CWE-362
  - id: date-date-deprecated
    pattern: 'new\s+Date\s*\(\s*\d+\s*\)|new\s+Date\s*\(\s*\)|Date\.getYear\s*\(\s*\)|Date\.getMonth\s*\(\s*\)'
    severity: low
    message: "Deprecated Date constructor/method тАФ use java.time.LocalDate/Instant/ZonedDateTime instead."
    metadata:
      cwe: CWE-477
  - id: date-calendar-no-zone
    pattern: 'Calendar\.getInstance\s*\(\s*\)'
    severity: info
    message: "Calendar.getInstance() uses default timezone тАФ may cause bugs in distributed systems. Use ZonedDateTime with explicit ZoneId."
    metadata:
      cwe: CWE-755

  # =========================================================================
  # 20. COMPLETABLEFUTURE EXCEPTION SWALLOWING
  # =========================================================================
  - id: cfuture-no-exceptionally
    pattern: 'CompletableFuture.*\.(?:thenApply|thenAccept|thenRun)\s*\([^)]*\)\s*(?!.*\.exceptionally|.*\.handle|.*\.whenComplete)'
    severity: medium
    message: "CompletableFuture chain without exceptionally()/handle() тАФ unhandled exceptions are silently lost. Add error handling."
