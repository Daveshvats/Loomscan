      cwe: CWE-400
  - id: cache-spring-no-eviction
    pattern: '@Cacheable\s*\(\s*["'']'
    severity: info
    message: "@Cacheable without eviction policy тАФ cache grows unbounded. Configure TTL via @CacheEvict or cache config."
    metadata:
      cwe: CWE-400

  # =========================================================================
  # 23. FILE UPLOAD SECURITY
  # =========================================================================
  - id: upload-multipart-no-limit
    pattern: 'MultipartFile\s+\w+|@RequestPart\s*\('
    severity: high
    message: "File upload without size limit тАФ can cause OOM or DoS. Set spring.servlet.multipart.max-file-size."
    metadata:
      cwe: CWE-400
  - id: upload-no-content-type-check
    pattern: 'MultipartFile.*\.getOriginalFilename\s*\(\s*\)'
    severity: medium
    message: "File upload тАФ only checking filename, not content type. Validate actual content type to prevent malicious uploads."
    metadata:
      cwe: CWE-434
  - id: upload-save-with-original-name
    pattern: 'transferTo\s*\(\s*new\s+File.*getOriginalFilename'
    severity: high
    message: "Saving upload with original filename тАФ path traversal risk. Generate a UUID filename instead."
    metadata:
      cwe: CWE-22

  # =========================================================================
  # 24. JWT SECURITY
  # =========================================================================
  - id: jwt-hardcoded-secret
    pattern: 'Jwts\.builder\s*\(\s*\).*\.signWith\s*\(\s*Keys\.hmacShaKeyFor\s*\(\s*[''"]'
    severity: critical
    message: "JWT signed with hardcoded secret тАФ secret is in source code. Load from environment/config."
