  - id: cfuture-join-no-timeout
    pattern: '\.join\s*\(\s*\)\s*;\s*$'
    severity: medium
    message: "CompletableFuture.join() without timeout тАФ blocks forever. Wrap in orTimeout() or use allOf()."
    metadata:
