      cwe: CWE-200

  # =========================================================================
  # 29. HTTP RESPONSE SECURITY
  # =========================================================================
  - id: response-no-security-headers
    pattern: '@Configuration.*\n.*WebSecurityConfigurerAdapter|SecurityFilterChain'
    severity: info
    message: "Security config тАФ verify X-Content-Type-Options, X-Frame-Options, Strict-Transport-Security headers are set."
    metadata:
      cwe: CWE-693
  - id: response-body-error-detail
    pattern: 'return\s+ResponseEntity.*status\(HttpStatus\.(?:INTERNAL_SERVER_ERROR|BAD_REQUEST)\).*body\s*\(\s*[''"]'
    severity: medium
    message: "Error response with hardcoded message тАФ may leak implementation details. Use ProblemDetail (RFC 7807)."
