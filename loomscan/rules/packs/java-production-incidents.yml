    metadata:
      cwe: CWE-362
  - id: race-double-checked-locking
    pattern: 'if\s*\(\s*\w+\s*==\s*null\s*\)\s*\{[^}]*synchronized'
    severity: medium
    message: "Double-checked locking тАФ ensure field is volatile. Without volatile, another thread may see partially constructed object."
    metadata:
      cwe: CWE-362
  - id: race-get-check-then-update
    pattern: 'if\s*\(\s*!\w+\.containsKey\s*\([^)]*\)\s*\)\s*\{[^}]*\.put\s*\('
