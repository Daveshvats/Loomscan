      cwe: CWE-347
  - id: jwt-no-expiration
    pattern: 'Jwts\.builder\s*\(\s*\)(?!.*\.setExpiration)'
    severity: high
    message: "JWT without expiration тАФ token valid forever. Add .setExpiration() with short TTL."
    metadata:
      cwe: CWE-613

  # =========================================================================
  # 25. RACE CONDITIONS
  # =========================================================================
  - id: race-check-then-act
    pattern: 'if\s*\(\s*\w+\.get\s*\([^)]*\)\s*==\s*null\s*\)\s*\{[^}]*\.put\s*\('
    severity: medium
