  # =========================================================================
  # 21. MISSING RESILIENCE (retry / circuit breaker for external calls)
  # =========================================================================
  - id: resilience-no-retry-resttemplate
    pattern: 'restTemplate\.(?:getForObject|postForObject|exchange|getForEntity|postForEntity)'
    severity: info
    message: "RestTemplate call without retry тАФ transient failures cause 500. Add @Retryable or Spring Retry."
