rules:
- id: lintr-assignment-operator
  pattern-regex: (?!)
  message: 'Assignment operator (lintr: assignment_linter) — Python uses =, verify
    this isn''t a comparison (==)'
  languages:
  - python
  severity: INFO
  metadata:
    source: lintr
    category: assignment
    original: assignment_linter
- id: lintr-brace-spacing
  pattern-regex: \bif\b[^:]*$
  message: 'Missing colon (lintr: brace_linter) — Python if statements require a colon
    at the end'
  languages:
  - python
  severity: ERROR
  metadata:
    source: lintr
    category: braces
    original: brace_linter
- id: lintr-operator-spacing
  pattern-regex: \w[+\-*/]\w
  message: 'No spaces around operator (lintr: operators_linter) — PEP 8: put spaces
    around binary operators'
  languages:
  - python
  severity: INFO
  metadata:
    source: lintr
    category: operators
    original: operators_linter
- id: lintr-comparison-chaining
  pattern-regex: \w+\s*[<>]=?\s*\w+\s+and\s+\w+\s*[<>]=?\s*\w+
  message: 'Chained comparison opportunity (lintr: operators_linter) — Python allows
    `a < b < c` instead of `a < b and b < c`'
  languages:
  - python
  severity: INFO
  metadata:
    source: lintr
    category: operators
    original: operators_linter
- id: lintr-inconsistent-quotes
  pattern-regex: '["''](?:[^"'']|\\.)*["'']'
  message: 'Check quote consistency (lintr: quotes_linter) — PEP 8: pick single or
    double quotes and be consistent'
  languages:
  - python
  severity: INFO
  metadata:
    source: lintr
    category: quotes
    original: quotes_linter
- id: lintr-semicolon-terminator
  pattern-regex: ;\s*$
  message: 'Statement terminator (lintr: semicolon_linter) — Python doesn''t require
    semicolons; remove for cleanliness'
  languages:
  - python
  severity: WARNING
  metadata:
    source: lintr
    category: semicolons
    original: semicolon_linter
- id: lintr-multiple-statements
  pattern-regex: ;\s*\w
  message: 'Multiple statements on one line (lintr: semicolon_linter) — put each statement
    on its own line'
  languages:
  - python
  severity: WARNING
  metadata:
    source: lintr
    category: semicolons
    original: semicolon_linter
- id: lintr-space-before-paren
  pattern-regex: \bif\s*\(
  message: 'Space before paren in if (lintr: spaces_linter) — Python: `if x:` not
    `if (x):`'
  languages:
  - python
  severity: INFO
  metadata:
    source: lintr
    category: spaces
    original: spaces_linter
- id: lintr-space-after-comma
  pattern-regex: ',[^\s\)]'
  message: 'Missing space after comma (lintr: spaces_linter) — PEP 8: put a space
    after each comma'
  languages:
  - python
  severity: INFO
  metadata:
    source: lintr
    category: spaces
    original: spaces_linter
- id: lintr-line-length
  pattern-regex: ^.{120,}$
  message: 'Line too long (lintr: line_length_linter) — 120+ chars. Break across lines
    for readability.'
  languages:
  - python
  severity: INFO
  metadata:
    source: lintr
    category: line_length
    original: line_length_linter
- id: lintr-mixed-indentation
  pattern-regex: '^\t+ '
  message: 'Mixed tabs and spaces (lintr: indentation_linter) — PEP 8: use spaces
    only, not tabs'
  languages:
  - python
  severity: WARNING
  metadata:
    source: lintr
    category: indentation
    original: indentation_linter
- id: lintr-naming-convention
  pattern-regex: \bdef\s+[a-z]+[A-Z]\w*\s*\(
  message: 'Mixed case function name (lintr: object_name_linter) — Python: snake_case
    for functions'
  languages:
  - python
  severity: INFO
  metadata:
    source: lintr
    category: naming
    original: object_name_linter
- id: lintr-naming-constant
  pattern-regex: ^\s*[a-z][a-zA-Z]*\s*=\s*[A-Z_]+\s*$
  message: 'Lowercase constant (lintr: object_name_linter) — module-level constants
    should be UPPER_CASE'
  languages:
  - python
  severity: INFO
  metadata:
    source: lintr
    category: naming
    original: object_name_linter
- id: lintr-deprecated-print
  pattern-regex: print\s+[^(]
  message: 'Deprecated print statement (lintr: deprecated_linter) — use print() function,
    not print statement'
  languages:
  - python
  severity: WARNING
  metadata:
    source: lintr
    category: deprecated
    original: deprecated_linter
- id: lintr-deprecated-has-key
  pattern: $DICT.has_key($KEY)
  message: 'Deprecated has_key (lintr: deprecated_linter) — use `key in dict` instead'
  languages:
  - python
  severity: WARNING
  metadata:
    source: lintr
    category: deprecated
    original: deprecated_linter
- id: lintr-nested-function
  pattern: "def $OUTER(...):\n  ...\n  def $INNER(...):\n    ...\n"
  message: 'Nested function (lintr: function_linter) — consider extracting to module
    level for testability'
  languages:
  - python
  severity: INFO
  metadata:
    source: lintr
    category: functions
    original: function_linter
- id: lintr-default-argument-mutable
  pattern: (?!)
  message: 'Mutable default argument (lintr: function_linter) — list/dict/set default
    is shared across calls'
  languages:
  - python
  severity: WARNING
  metadata:
    source: lintr
    category: functions
    original: function_linter
- id: lintr-implicit-return
  pattern: "def $FUNC(...):\n  ...\n  if $COND:\n    return $X\n  # no return at end\n"
  message: 'Implicit None return (lintr: return_linter) — function may return None
    unexpectedly'
  languages:
  - python
  severity: INFO
  metadata:
    source: lintr
    category: return
    original: return_linter
- id: lintr-high-cyclomatic
  pattern-regex: (?:\bif\b|\belif\b|\bfor\b|\bwhile\b|\bexcept\b|\band\b|\bor\b).*\n(?:.*\n){8,}(?:\bif\b|\belif\b|\bfor\b|\bwhile\b|\bexcept\b|\band\b|\bor\b)
  message: 'High cyclomatic complexity (lintr: cyclocomp_linter) — too many branches.
    Refactor into smaller functions.'
  languages:
  - python
  severity: WARNING
  metadata:
    source: lintr
    category: complexity
    original: cyclocomp_linter
- id: lintr-long-function
  pattern-regex: ^def\s+\w+\([^)]*\):\n(?:[^\n]*\n){60,}
  message: 'Very long function (lintr: length_linter) — 60+ lines. Split into smaller
    functions.'
  languages:
  - python
  severity: INFO
  metadata:
    source: lintr
    category: length
    original: length_linter
