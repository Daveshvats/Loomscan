rules:
- id: detekt-complex-condition
  pattern-either:
  - pattern: 'if $X and $Y and $Z and $W:'
  - pattern: 'if $X or $Y or $Z or $W:'
  message: 'Complex boolean condition (detekt: ComplexCondition) — 4+ boolean operations
    in one condition. Extract to a named variable.'
  languages:
  - python
  severity: WARNING
  metadata:
    source: detekt
    category: complexity
    original: ComplexCondition
- id: detekt-complex-method
  pattern: "def $FUNC(...):\n  ...\n  if ...:\n    ...\n  if ...:\n    ...\n  if ...:\n\
    \    ...\n  if ...:\n    ...\n  if ...:\n    ...\n  ...\n"
  message: 'Complex method (detekt: ComplexMethod) — 5+ if statements. Consider extracting
    helper functions.'
  languages:
  - python
  severity: WARNING
  metadata:
    source: detekt
    category: complexity
    original: ComplexMethod
- id: detekt-long-parameter-list
  pattern: 'def $FUNC($A, $B, $C, $D, $E, $F, $G, ...):'
  message: 'Long parameter list (detekt: LongParameterList) — 6+ parameters. Group
    related params into a dataclass.'
  languages:
  - python
  severity: INFO
  metadata:
    source: detekt
    category: complexity
    original: LongParameterList
- id: detekt-nested-block-depth
  pattern: "def $FUNC(...):\n  ...\n  if ...:\n    ...\n    if ...:\n      ...\n \
    \     if ...:\n        ...\n        if ...:\n          ...\n"
  message: 'Deeply nested blocks (detekt: NestedBlockDepth) — 4+ levels of nesting.
    Use early returns or extract functions.'
  languages:
  - python
  severity: WARNING
  metadata:
    source: detekt
    category: complexity
    original: NestedBlockDepth
- id: detekt-too-long-method
  pattern-regex: ^def\s+\w+\([^)]*\):(?:.*\n){50,}
  message: 'Too long method (detekt: TooLongMethod) — 50+ lines. Split into smaller
    functions.'
  languages:
  - python
  severity: INFO
  metadata:
    source: detekt
    category: complexity
    original: TooLongMethod
- id: detekt-magic-number
  pattern-regex: (?<![\w.])\d{4,}(?![\w.])
  message: 'Magic number (detekt: MagicNumber) — 4+ digit literal. Extract to a named
    constant.'
  languages:
  - python
  severity: INFO
  metadata:
    source: detekt
    category: style
    original: MagicNumber
- id: detekt-wildcard-import
  pattern: from $MODULE import *
  message: 'Wildcard import (detekt: WildcardImport) — imports pollute namespace.
    Import only what you need.'
  languages:
  - python
  severity: WARNING
  metadata:
    source: detekt
    category: style
    original: WildcardImport
- id: detekt-unused-import
  pattern: import $MODULE
  message: 'Possibly unused import (detekt: UnusedImport) — verify this import is
    actually used'
  languages:
  - python
  severity: INFO
  metadata:
    source: detekt
    category: style
    original: UnusedImport
- id: detekt-return-type-mismatch
  pattern-either:
  - pattern: "def $FUNC(...):\n  ...\n  return $X\n  ...\n  return\n"
  - pattern: "def $FUNC(...):\n  ...\n  return\n  ...\n  return $X\n"
  message: 'Inconsistent return (detekt: ReturnCount) — function returns both a value
    and None. Be explicit.'
  languages:
  - python
  severity: WARNING
  metadata:
    source: detekt
    category: style
    original: ReturnCount
- id: detekt-empty-function
  pattern: "def $FUNC(...):\n  pass\n"
  message: 'Empty function (detekt: EmptyFunctionBlock) — function body is just ''pass''.
    Implement or mark abstract.'
  languages:
  - python
  severity: INFO
  metadata:
    source: detekt
    category: empty-blocks
    original: EmptyFunctionBlock
- id: detekt-empty-if
  pattern: "if $COND:\n  pass\n"
  message: 'Empty if block (detekt: EmptyIfBlock) — if body is just ''pass''. Likely
    a bug or missing implementation.'
  languages:
  - python
  severity: WARNING
  metadata:
    source: detekt
    category: empty-blocks
    original: EmptyIfBlock
- id: detekt-empty-catch
  pattern: "except $EXC:\n  pass\n"
  message: 'Empty catch block (detekt: EmptyCatchBlock) — exception swallowed silently.
    At minimum, log the error.'
  languages:
  - python
  severity: WARNING
  metadata:
    source: detekt
    category: empty-blocks
    original: EmptyCatchBlock
- id: detekt-empty-for
  pattern: "for $VAR in $ITER:\n  pass\n"
  message: 'Empty for loop (detekt: EmptyForBlock) — loop body is just ''pass''. Likely
    a bug.'
  languages:
  - python
  severity: WARNING
  metadata:
    source: detekt
    category: empty-blocks
    original: EmptyForBlock
- id: detekt-empty-while
  pattern: "while $COND:\n  pass\n"
  message: 'Empty while loop (detekt: EmptyWhileBlock) — loop body is just ''pass''.
    Likely a bug.'
  languages:
  - python
  severity: WARNING
  metadata:
    source: detekt
    category: empty-blocks
    original: EmptyWhileBlock
- id: detekt-broad-exception
  pattern: 'except Exception:'
  message: 'Broad exception (detekt: SwallowedException) — catches all Exceptions.
    Catch the specific exception type.'
  languages:
  - python
  severity: WARNING
  metadata:
    source: detekt
    category: exceptions
    original: SwallowedException
- id: detekt-raise-generic
  pattern: raise Exception(...)
  message: 'Generic exception (detekt: ThrowingExceptionsWithoutMessageOrCause) —
    raise specific exceptions, not bare Exception'
  languages:
  - python
  severity: WARNING
  metadata:
    source: detekt
    category: exceptions
    original: ThrowingExceptionsWithoutMessageOrCause
- id: detekt-print-stacktrace
  pattern: $E.printStackTrace()
  message: 'Print stacktrace (detekt: PrintStackTrace) — use proper logging instead'
  languages:
  - python
  severity: INFO
  metadata:
    source: detekt
    category: exceptions
    original: PrintStackTrace
- id: detekt-eq-to-equals
  pattern: $X == None
  message: 'Use ''is None'' not ''== None'' (detekt: EqualsWithHashCode) — identity
    check is correct for None'
  languages:
  - python
  severity: WARNING
  metadata:
    source: detekt
    category: potential-bugs
    original: EqualsWithHashCode
- id: detekt-implicit-default
  pattern: (?!)
  message: 'Mutable default argument (detekt: IteratorNotThrowingNoSuchElement) —
    list/dict/set default is shared across calls. Use None + initialize in body.'
  languages:
  - python
  severity: WARNING
  metadata:
    source: detekt
    category: potential-bugs
    original: ImplicitDefault
- id: detekt-unreachable-code
  pattern: 'return $X

    $Y

    '
  message: 'Unreachable code (detekt: UnreachableCode) — statement after return is
    never executed'
  languages:
  - python
  severity: WARNING
  metadata:
    source: detekt
    category: potential-bugs
    original: UnreachableCode
- id: detekt-unsafe-call
  pattern: $X.lower()
  message: 'Possibly unsafe call (detekt: UnsafeCall) — verify $X is not None before
    calling methods on it'
  languages:
  - python
  severity: INFO
  metadata:
    source: detekt
    category: potential-bugs
    original: UnsafeCall
- id: detekt-variable-naming
  pattern-regex: \bdef\s+[A-Z][a-zA-Z]*\s*\(
  message: 'Function name starts with uppercase (detekt: FunctionName) — Python convention
    is snake_case'
  languages:
  - python
  severity: INFO
  metadata:
    source: detekt
    category: naming
    original: FunctionName
- id: detekt-variable-naming-lower
  pattern-regex: \b[A-Z]{2,}[a-zA-Z]*\s*=
  message: 'Variable uses CamelCase (detekt: VariableNaming) — Python convention is
    snake_case for variables'
  languages:
  - python
  severity: INFO
  metadata:
    source: detekt
    category: naming
    original: VariableNaming
- id: detekt-for-in-list
  pattern: "for $I in range(len($LIST)):\n  ...\n  $LIST[$I]\n"
  message: 'Index-based iteration (detekt: ForEachOnRange) — iterate directly: `for
    item in list:`'
  languages:
  - python
  severity: INFO
  metadata:
    source: detekt
    category: performance
    original: ForEachOnRange
- id: detekt-string-concat-in-loop
  pattern: "for ...:\n  ...\n  $S = $S + ...\n"
  message: 'String concatenation in loop (detekt: SpreadOperator) — use ''''.join()
    for efficiency'
  languages:
  - python
  severity: WARNING
  metadata:
    source: detekt
    category: performance
    original: SpreadOperator
- id: detekt-list-creation-in-loop
  pattern: "for ...:\n  ...\n  $LIST = $LIST + [$X]\n"
  message: 'List append via + in loop (detekt: UnnecessaryTemporaryInstantiation)
    — use $LIST.append($X)'
  languages:
  - python
  severity: WARNING
  metadata:
    source: detekt
    category: performance
    original: UnnecessaryTemporaryInstantiation
