# === v5.24: Timing attack detection (non-constant-time comparison) ===

- id: java-timing-attack-equals
  pattern: '(?:password|token|secret|apiKey|api_key|hash|digest|hmac)\w*\s*\.(?:equals|equalsIgnoreCase)\s*\('
  severity: high
  message: "Timing attack: .equals() on secret — comparison is not constant-time. Use MessageDigest.isEqual() or Arrays.constantTimeEquals()."
  metadata:
    cwe: CWE-208
- id: java-timing-attack-strcmp
  pattern: '(?:password|token|secret|apiKey|api_key|hash)\w*\s*==\s*\w+'
  severity: high
  message: "Timing attack: == comparison on secret — not constant-time. Use MessageDigest.isEqual()."
  metadata:
    cwe: CWE-208
- id: py-timing-attack-eq
  pattern: '(?:password|token|secret|api_key|apiKey|hash|hmac)\w*\s*==\s*\w+'
  severity: high
  message: "Timing attack: == comparison on secret — not constant-time. Use hmac.compare_digest() or secrets.compare_digest()."
  metadata:
    cwe: CWE-208
- id: py-timing-attack-checkpw
  pattern: 'check_password_hash\s*\(\s*\w+\s*,\s*\w+\s*\)\s*(?!.*#.*safe)'
  severity: info
  message: "Password check — verify using constant-time comparison. werkzeug.security.check_password_hash is safe."
  metadata:
    cwe: CWE-208
- id: js-timing-attack-eq
  pattern: '(?:password|token|secret|apiKey|api_key|hash)\w*\s*(?:===|==)\s*\w+'
  severity: high
  message: "Timing attack: ==/=== comparison on secret — not constant-time. Use crypto.timingSafeEqual()."
  metadata:
    cwe: CWE-208

