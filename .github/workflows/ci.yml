name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install LoomScan with dev dependencies
        run: pip install -e ".[dev]"
      - name: Configure git for tests
        run: |
          git config --global user.email "ci@test.local"
          git config --global user.name "CI Test"
      - name: Run test suite
        run: python -m pytest tests/ --tb=short -q

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e ".[dev]"
      - run: python -m mypy loomscan/ --ignore-missing-imports || true
        continue-on-error: true

  self-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e ".[dev]"
      - name: Run LoomScan self-scan
        run: |
          loomscan check --repo . --full --json > self-scan.json || true
          python3 -c "
          import json, sys
          with open('self-scan.json') as f:
              text = f.read()
          start = text.find('{')
          if start < 0:
              print('No JSON output from LoomScan self-scan')
              sys.exit(1)
          decoder = json.JSONDecoder()
          data, _ = decoder.raw_decode(text[start:])
          errors = data.get('scanner_error_count', 0)
          if errors > 0:
              print(f'LoomScan self-scan: {errors} scanner errors — failing build')
              sys.exit(1)
          findings = len(data.get('findings', []))
          print(f'LoomScan self-scan: {findings} findings, 0 scanner errors — OK')
          "
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: loomscan-self-scan
          path: self-scan.json