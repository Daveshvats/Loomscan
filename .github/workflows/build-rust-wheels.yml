# Build pre-built binary wheels for loomscan-regex (Rust core) on all major platforms.
#
# v5.8: This CI produces platform-specific wheels so users can do
# `pip install loomscan[fast]` without needing a Rust compiler.
#
# Wheels are built for:
#   - Linux x86_64 (manylinux_2_17)
#   - Linux aarch64 (manylinux_2_17)
#   - macOS x86_64 (Intel)
#   - macOS aarch64 (Apple Silicon)
#   - Windows x86_64
#
# Triggered on:
#   - Tags matching v* (creates a release)
#   - Manual dispatch
#
# Wheels are uploaded to:
#   - GitHub Releases (as artifacts)
#   - PyPI (via twine, when a PyPI token is configured)

name: Build Rust Core Wheels

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to PyPI after build'
        required: false
        default: false
        type: boolean

permissions:
  contents: write  # for uploading to GitHub Releases

jobs:
  build:
    name: Build wheel for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: manylinux_2_28
          # Linux aarch64 (AWS Graviton, etc.)
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: manylinux_2_28
            cross: true
          # macOS Intel
          - os: macos-13
            target: x86_64-apple-darwin
          # macOS Apple Silicon (M1/M2/M3)
          - os: macos-14
            target: aarch64-apple-darwin
          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install maturin
        run: pip install maturin

      - name: Build wheel (native)
        if: matrix.cross != true
        working-directory: rust-core
        run: |
          maturin build --release --target ${{ matrix.target }} --out dist
        env:
          PYO3_PYTHON: ${{ env.pythonLocation }}/python

      - name: Build wheel (cross-compile for aarch64 Linux)
        if: matrix.cross == true
        working-directory: rust-core
        run: |
          # Install cross-compilation tools for aarch64
          sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
          export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          maturin build --release --target ${{ matrix.target }} --out dist
        env:
          PYO3_PYTHON: ${{ env.pythonLocation }}/python
          PYO3_CROSS: '1'
          PYO3_CROSS_PYTHON_VERSION: '3.12'

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: rust-core/dist/*.whl
          if-no-files-found: error

      - name: Test wheel (native only)
        if: matrix.cross != true && runner.os != 'Windows'
        run: |
          pip install --force-reinstall rust-core/dist/*.whl
          python -c "from loomscan_regex import is_available, RegexEngine; print('available:', is_available()); eng = RegexEngine(); eng.add_rule('test', r'\beval\b', 'high', 'test', ''); print('hits:', eng.scan('x = eval(1)')); print('OK')"

  # ============================================================================
  # Publish to PyPI (only on tag pushes, when PYPI_TOKEN secret is set)
  # ============================================================================
  publish:
    name: Publish wheels to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: List collected wheels
        run: ls -la dist/

      - name: Publish to PyPI
        if: env.PYPI_TOKEN != ''
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          pip install twine
          twine upload dist/*.whl --username __token__ --password "$PYPI_TOKEN"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          generate_release_notes: true

  # ============================================================================
  # Smoke test: install from PyPI on a clean machine (after publish)
  # ============================================================================
  smoke-test:
    name: Smoke test on ${{ matrix.os }}
    needs: publish
    runs-on: ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install loomscan with Rust core
        run: pip install loomscan[fast]

      - name: Verify install
        run: |
          loomscan --version
          loomscan doctor
