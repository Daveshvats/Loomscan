name: Build JetBrains Plugin

on:
  push:
    branches: [m[main, master]
    paths:
      - 'editor/intellij-loomscan/**'
  pull_request:
    paths:
      - 'editor/intellij-loomscan/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Build plugin
        working-directory: editor/intellij-loomscan
        run: gradle buildPlugin --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: loomscan-intellij-plugin
          path: editor/intellij-loomscan/build/distributions/*.zip
          retention-days: 30